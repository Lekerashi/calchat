<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>CalChat</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Google Identity Services (OAuth in the browser) -->
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="title">📅 CalChat</div>
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙</button>
    </header>

    <main id="messages" aria-live="polite"></main>

    <form id="composer" autocomplete="off">
      <div id="thumbs"></div>
      <div class="composer-row">
        <label class="icon-btn" title="Attach a photo">
          📷
          <input id="fileInput" type="file" accept="image/*" multiple hidden />
        </label>
        <button id="micEn" type="button" class="icon-btn mic" title="Speak (English)">🎤<span class="lng">EN</span></button>
        <button id="micJa" type="button" class="icon-btn mic" title="Speak (日本語)">🎤<span class="lng">JP</span></button>
        <textarea id="input" rows="1" placeholder="Message, speak, or paste a screenshot…"></textarea>
        <button id="sendBtn" class="icon-btn send" title="Send">▶</button>
      </div>
    </form>
  </div>

  <!-- Settings panel -->
  <div id="settingsOverlay" class="overlay hidden">
    <div class="sheet">
      <div class="sheet-head">
        <h2>Settings</h2>
        <button id="closeSettings" class="icon-btn">✕</button>
      </div>

      <section>
        <h3>Claude (Anthropic)</h3>
        <label>API key
          <input id="apiKeyInput" type="password" placeholder="sk-ant-…" />
        </label>
        <label>Model
          <select id="modelSelect">
            <option value="claude-opus-4-8">Opus 4.8 — smartest (pricier)</option>
            <option value="claude-sonnet-4-6">Sonnet 4.6 — balanced (cheaper)</option>
            <option value="claude-haiku-4-5">Haiku 4.5 — fastest/cheapest</option>
          </select>
        </label>
        <p class="hint">Your key is stored only on this device, in your browser.</p>
      </section>

      <section>
        <h3>Google Calendar</h3>
        <label>OAuth Client ID
          <input id="clientIdInput" type="text" placeholder="…apps.googleusercontent.com" />
        </label>
        <button id="connectGoogle" class="btn">+ Connect a Google account</button>
        <div id="accountsList" class="accounts"></div>
        <button id="refreshCals" class="btn ghost">↻ Refresh calendars</button>
        <p class="hint">Connect each account separately. See the README for the 10-minute Google Cloud setup.</p>
      </section>

      <button id="saveSettings" class="btn primary">Save</button>
    </div>
  </div>

  <script src="google.js"></script>
  <script src="claude.js"></script>
  <script src="app.js"></script>
</body>
</html>
